name: Code Coverage

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/code-coverage.yml"
      - "apps/diatreme/**"
      - "apps/dunmir/agent/**"
      - "apps/dunmir/worker/**"
      - "packages/**"
      - "mise.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "pyproject.toml"
      - "turbo.json"
      - "uv.lock"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/code-coverage.yml"
      - "apps/diatreme/**"
      - "apps/dunmir/agent/**"
      - "apps/dunmir/worker/**"
      - "packages/**"
      - "mise.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "pyproject.toml"
      - "turbo.json"
      - "uv.lock"

permissions:
  contents: read
  code-quality: write

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --all-packages --all-extras

      - name: Run Dun Mir agent coverage
        run: >
          uv run --package mikrotik-minder-agent pytest apps/dunmir/agent
          --cov=mikrotik_minder_agent
          --cov-report=term-missing
          --cov-report=xml:apps/dunmir/agent/coverage.xml

      - name: Upload Dun Mir agent coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
        with:
          file: apps/dunmir/agent/coverage.xml
          language: Python
          label: dunmir-agent/pytest

  javascript:
    name: JS / TS coverage (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: mikrotik-minder-worker
            language: JavaScript
            label: dunmir-worker/vitest
            report: apps/dunmir/worker/coverage/cobertura-coverage.xml
          - package: "@calebsargeant/diatreme"
            language: JavaScript
            label: diatreme/vitest
            report: apps/diatreme/coverage/cobertura-coverage.xml
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install

      - name: Run Vitest coverage
        run: pnpm turbo run coverage --filter=${{ matrix.package }}

      - name: Upload ${{ matrix.label }} coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
        with:
          file: ${{ matrix.report }}
          language: ${{ matrix.language }}
          label: ${{ matrix.label }}
