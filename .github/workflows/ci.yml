#    name: Branch name
#    runs-on: ubuntu-latest
#    if: github.event_name == 'pull_request'
#    steps:
#      - name: Enforce TBD branch naming
#        env:
#          HEAD_REF: ${{ github.head_ref }}
#        run: |
#          set -euo pipefail
#
#          if [[ "${HEAD_REF}" =~ ^(dependabot|renovate)/ ]]; then
#            echo "Skipping bot branch '${HEAD_REF}'."
#            exit 0
#          fi
#
#          if [[ "${HEAD_REF}" =~ ^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)/[^/]+(/[^/]+)?$ ]]; then
#            echo "Branch '${HEAD_REF}' follows TBD naming convention."
#            exit 0
#          fi
#
#          echo "::error::Branch '${HEAD_REF}' does not follow TBD naming convention."
#          echo "::error::Expected: <type>/<description> or <type>/<scope>/<description>."
#          echo "::error::Allowed types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert."
#          exit 1

  js:
    name: JS / TS (turbo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm turbo run lint typecheck test build
      - name: Dun Mir worker dry deploy
        env:
          CLOUDFLARE_API_TOKEN: dummy
        run: pnpm --dir apps/dunmir/worker exec wrangler deploy --dry-run --outdir dist

  python:
    name: Python (uv + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
      - run: uv sync --all-packages
      - run: uvx ruff check .

  image:
    name: PR image
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
      pull-requests: read
    steps:
      - uses: magmamoose/diatreme@d0706e1f21c7dd5fe8e1067ca7b1a5c042d56c1d # v1.30.0
        with:
          mode: ci
          image_name: dunmir-agent
          bake_file: docker-bake.hcl
          bake_target: default
          platforms: linux/amd64,linux/arm64
          enforce_branch_naming: 'false'
          github-token: ${{ secrets.GITHUB_TOKEN }}
