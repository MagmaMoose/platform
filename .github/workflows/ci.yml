name: CI

on:
  pull_request:
  push:
    branches: [main]

# Note: per-app workflows under apps/*/.github/ are preserved for reference but
# are INERT in a monorepo (GitHub only runs workflows from the repo-root .github).
# This root pipeline drives the whole workspace via Turborepo + uv.

jobs:
  js:
    name: JS / TS (turbo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm turbo run lint typecheck test build

  python:
    name: Python (uv + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --all-packages
      - run: uvx ruff check .
