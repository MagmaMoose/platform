name: CI

on:
  pull_request:
  push:
    branches: [main]

# Note: per-app workflows under apps/*/.github/ are preserved for reference but
# are INERT in a monorepo (GitHub only runs workflows from the repo-root .github).
# This root pipeline drives the whole workspace via Turborepo + uv.

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
# Magma Moose Diatreme will automatically enforce branch naming conventions on PRs if the `enforce_branch_naming` input is set to 'true'. To enable this, uncomment the following job and adjust the regex as needed for your branch naming rules. The example regex allows for conventional commit types (feat, fix, docs, etc.) followed by a description, with optional scope.
# The below is pretty cool code though
