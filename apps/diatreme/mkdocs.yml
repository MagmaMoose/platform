site_name: Diatreme
site_url: https://docs.diatreme.magmamoose.com/
site_description: Setup and reference documentation for magmamoose/diatreme@v1.
repo_name: magmamoose/diatreme
repo_url: https://github.com/magmamoose/diatreme
theme:
  name: material
  logo: diatreme-logo.png
  favicon: diatreme-logo.png
  features:
    - navigation.tabs
    - navigation.top
markdown_extensions:
  - admonition
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Concepts: concepts.md
  - Setup:
      - Organization: organization-setup.md
      - Choose your setup: choose-your-setup.md
      - Repository: repository-setup.md
      - Require Copilot Review: copilot-review.md
  - Branching strategies: branching-strategies.md
  - Reference:
      - Action inputs and outputs: reference/action-inputs-outputs.md
  - Operations:
      - Rolling back a release: rollback.md
