name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yaml'

permissions:
  contents: read

concurrency:
  group: deploy-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate worker
        run: npm run worker:check

      # Bind the production KV namespace without committing the ID (keeps
      # wrangler.jsonc clean for self-hosters). Set repo/org Actions variable
      # COPILOT_QUOTA_KV_ID to the namespace ID; skipped when it's unset.
      - name: Inject KV namespace binding
        if: ${{ vars.COPILOT_QUOTA_KV_ID != '' }}
        env:
          KV_ID: ${{ vars.COPILOT_QUOTA_KV_ID }}
        run: |
          # shellcheck disable=SC2016  # ${process.env.KV_ID} is a JS template, not shell
          node -e 'const fs=require("fs");const f="worker/wrangler.jsonc";const s=fs.readFileSync(f,"utf8");if(!s.includes("// __KV_NAMESPACES__")){console.error("KV marker missing");process.exit(1);}fs.writeFileSync(f,s.replace("// __KV_NAMESPACES__",`"kv_namespaces": [{ "binding": "COPILOT_QUOTA_KV", "id": "${process.env.KV_ID}" }],`));console.log("Injected COPILOT_QUOTA_KV binding");'

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
