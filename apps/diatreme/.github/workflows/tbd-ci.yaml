name: TBD CI — Build and Push PR Image

# Thin wrapper around magmamoose/diatreme@v1 (mode: ci).
# Prefer using the action directly for full control:
#
#   jobs:
#     build:
#       runs-on: ubuntu-latest
#       permissions:
#         contents: read
#         packages: write
#         pull-requests: read
#       steps:
#         - uses: magmamoose/diatreme@v1
#           with:
#             mode: ci
#             image_name: my-app
#             github-token: ${{ secrets.GITHUB_TOKEN }}

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Base image name without registry/owner (e.g., my-app)'
        required: true
        type: string
      bake_file:
        required: false
        type: string
        default: 'docker-bake.hcl'
      bake_target:
        required: false
        type: string
        default: 'default'
      platforms:
        required: false
        type: string
        default: 'linux/amd64'
      registry:
        required: false
        type: string
        default: 'ghcr.io'
      runner:
        required: false
        type: string
        default: 'ubuntu-latest'
      enforce_branch_naming:
        required: false
        type: boolean
        default: true
      require-copilot-review:
        required: false
        type: boolean
        default: false
      copilot-review-freshness:
        required: false
        type: string
        default: 'after_latest_commit'
      copilot-review-allowed-logins:
        required: false
        type: string
        default: '["copilot-pull-request-reviewer[bot]"]'
      copilot-review-allow-login-pattern:
        required: false
        type: boolean
        default: false
      copilot-review-fail-on-unknown-identity:
        required: false
        type: boolean
        default: true
      copilot-review-ignore-drafts:
        required: false
        type: boolean
        default: true
      copilot-review-ignore-labels:
        required: false
        type: string
        default: '[]'
      copilot-review-ignore-authors:
        required: false
        type: string
        default: '[]'
      copilot-review-ignore-paths:
        required: false
        type: string
        default: '[]'
      copilot-review-reporter:
        required: false
        type: string
        default: 'commit-status'
      copilot-review-check-name:
        required: false
        type: string
        default: 'Diatreme / Require Copilot Review'

jobs:
  build:
    name: Build (${{ inputs.bake_target }})
    runs-on: ${{ inputs.runner }}
    permissions:
      # `statuses: write` is needed when `require-copilot-review` is true and reporter is `commit-status`.
      # `checks: write` is needed when reporter is `check-run`. You can remove these if not using copilot review.
      contents: read
      packages: write
      pull-requests: read
      statuses: write
      checks: write
    steps:
      - uses: magmamoose/diatreme@fb7250aea853782d9d63783b66743a6fdac9d2ae # v1
        with:
          mode: ci
          image_name:              ${{ inputs.image_name }}
          bake_file:               ${{ inputs.bake_file }}
          bake_target:             ${{ inputs.bake_target }}
          platforms:               ${{ inputs.platforms }}
          registry:                ${{ inputs.registry }}
          enforce_branch_naming:   ${{ inputs.enforce_branch_naming }}
          require-copilot-review:  ${{ inputs.require-copilot-review }}
          copilot-review-freshness: ${{ inputs.copilot-review-freshness }}
          copilot-review-allowed-logins: ${{ inputs.copilot-review-allowed-logins }}
          copilot-review-allow-login-pattern: ${{ inputs.copilot-review-allow-login-pattern }}
          copilot-review-fail-on-unknown-identity: ${{ inputs.copilot-review-fail-on-unknown-identity }}
          copilot-review-ignore-drafts: ${{ inputs.copilot-review-ignore-drafts }}
          copilot-review-ignore-labels: ${{ inputs.copilot-review-ignore-labels }}
          copilot-review-ignore-authors: ${{ inputs.copilot-review-ignore-authors }}
          copilot-review-ignore-paths: ${{ inputs.copilot-review-ignore-paths }}
          copilot-review-reporter: ${{ inputs.copilot-review-reporter }}
          copilot-review-check-name: ${{ inputs.copilot-review-check-name }}
          github-token:            ${{ secrets.GITHUB_TOKEN }}
