name: Worker Deploy

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Opt into the `prod` GitHub Environment so env-scoped secrets resolve.
    # If the user's CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secrets live at
    # repo scope, they'll still resolve here too. If they're org-scoped with
    # "selected repositories" visibility, the public mikrotik-minder repo needs
    # to be in the selected list.
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install
        working-directory: worker
        run: npm ci

      - name: Typecheck
        working-directory: worker
        run: npm run typecheck

      - name: Apply D1 migrations (remote)
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: "3.114.17"
          command: d1 migrations apply minder --remote --env prod

      - name: Deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: "3.114.17"
          command: deploy --env prod
