{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mma.fullname" . }}
  labels:
    {{- include "mma.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mma.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    {{- toYaml .Values.networkPolicy.egress | nindent 4 }}
{{- end -}}
