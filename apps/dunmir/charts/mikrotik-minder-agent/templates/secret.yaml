{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mma.fullname" . }}-env
  labels:
    {{- include "mma.labels" . | nindent 4 }}
type: Opaque
{{- if .Values.secrets.data }}
stringData:
  {{- range $k, $v := .Values.secrets.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end -}}
{{- if .Values.git.sshKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mma.fullname" . }}-git-ssh
  labels:
    {{- include "mma.labels" . | nindent 4 }}
type: Opaque
stringData:
  # `|` (clip), NOT `|-` (strip): an OpenSSH private key must end with a
  # trailing newline — `|-` eats it and ssh then fails with `error in libcrypto`.
  git_deploy: |
    {{- .Values.git.sshKey | nindent 4 }}
  {{- if .Values.git.knownHosts }}
  known_hosts: |
    {{- .Values.git.knownHosts | nindent 4 }}
  {{- end }}
{{- end -}}
